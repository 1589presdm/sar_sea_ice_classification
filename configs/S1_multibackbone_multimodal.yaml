custom_modules_path: ./thor_extension
trainer:
  accelerator: gpu
  strategy: auto
  devices: auto
  num_nodes: 1
  precision: 16-mixed
  logger: true
  callbacks:
    - class_path: RichProgressBar
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: epoch
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: val/mIoU
        patience: 30
        mode: max
        min_delta: 1e-4
        check_finite: false
        verbose: true
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: ./results/thor_s1_doppler_yaml/checkpoints
        monitor: val/mIoU
        mode: max
        save_top_k: 1
        save_last: true
        filename: epoch{epoch:03d}
        auto_insert_metric_name: false
  max_epochs: 30
  check_val_every_n_epoch: 1
  accumulate_grad_batches: 1
  log_every_n_steps: 1
  enable_checkpointing: true
  default_root_dir: ./results/thor_s1_doppler_yaml
data:
  class_path: terratorch.datamodules.GenericMultiModalDataModule
  init_args:
    task: segmentation
    batch_size: 4
    num_workers: 0
    modalities:
      - S1
      - DOPPLER
    rgb_modality: S1
    rgb_indices: [0, 1, 1]
    # Update dataset paths before running training.
    train_data_root:
      S1: /path/to/dataset/tif_images
      DOPPLER:  /path/to/dataset/tif_doppler
    train_label_data_root: /path/to/dataset/tif_mask
    val_data_root:
      S1:  /path/to/dataset/tif_images
      DOPPLER: /path/to/dataset/tif_doppler
    val_label_data_root: /path/to/dataset/tif_mask
    test_data_root:
      S1:  /path/to/dataset/tif_images
      DOPPLER:  /path/to/dataset/tif_doppler
    test_label_data_root: /path/to/dataset/tif_mask
    train_split: /path/to/dataset/splits/train.txt
    val_split: /path/to/dataset/splits/val.txt
    test_split: /path/to/dataset/splits/test.txt
    allow_substring_file_names: true
    image_grep:
      S1: "*.tif"
      DOPPLER: "*_doppler.tif"
    label_grep: "*_mask.tif"
    no_label_replace: -1
    no_data_replace: 0
    concat_bands: true
    check_stackability: false
    dataset_bands:
      S1:
        - EW_HH
        - EW_HV
      DOPPLER:
        - DOPPLER
    means:
      S1:
        - 139.9802950682014
        - 114.3046808294434
      DOPPLER:
        - 0.46692912768293554
    stds:
      S1:
        - 52.433221109613626
        - 60.61472859030126
      DOPPLER:
        - 0.2555213128223904
    num_classes: 2
    train_transform:
      - class_path: albumentations.RandomCrop
        init_args:
          height: 288
          width: 288
      - class_path: albumentations.D4
      - class_path: albumentations.pytorch.transforms.ToTensorV2
model:
  class_path: terratorch.tasks.SemanticSegmentationTask
  init_args:
    model_factory: EncoderDecoderFactory
    model_args:
      backbone: MultiBackboneWrapper
      backbone_bands:
        - EW_HH
        - EW_HV
        - DOPPLER
      backbone_merge_features: concat
      backbone_rescale_features: up
      backbone_encoders:
        - thor_v1_base:
            freeze_backbone: true
            backbone_merge_method: concat
            backbone_pretrained: true
            backbone_input_params:
              ground_covers:
                - 2880
              flexivit_patch_size_seqs:
                - 8
            backbone_out_indices:
              - -1
            backbone_model_bands:
              - EW_HH
              - EW_HV
        - vit_small_patch16_224.dino:
            out_indices:
              - -1
            in_chans: 1
            backbone_pretrained: true
            backbone_dynamic_img_size: true
            bands:
              - DOPPLER
      decoder: FCNDecoder
      decoder_channels: 256
      num_classes: 2
      head_dropout: 0.1
    loss: ce
    ignore_index: -1
    freeze_backbone: false
    freeze_decoder: false
    tiled_inference_on_validation: true
    tiled_inference_on_testing: true
    tiled_inference_parameters:
      h_crop: 288
      h_stride: 256
      w_crop: 288
      w_stride: 256
      average_patches: true
      batch_size: 4
optimizer:
  class_path: torch.optim.AdamW
  init_args:
    lr: 2e-5
    weight_decay: 0.05
lr_scheduler:
  class_path: lightning.pytorch.cli.ReduceLROnPlateau
  init_args:
    monitor: val/mIoU
    mode: max
    factor: 0.5
    patience: 10
    threshold: 1e-4